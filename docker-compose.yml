version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STORE_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=station_transfers
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  test:
    build:
      context: .
      target: builder
    command: npm test

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=station_transfers
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
